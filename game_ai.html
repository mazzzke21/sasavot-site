            switch(difficulty) {
                case 'easy': return 15;
                case 'hard': return 5;
                default: return 10;

        function getRebalanceRule(difficulty) {
            switch(difficulty) {
                case 'easy':
                    return 'ШАНС УСПЕХА (ЛЕГКО): Действия персонажа почти всегда успешны. Даже прямые столкновения с SASAVOT редко заканчиваются фатально. Монстр медлителен и часто теряет след.';
                case 'hard':
                    return 'ШАНС УСПЕХА (ХАРДКОР): Действия персонажа часто проваливаются. Прямое противостояние с SASAVOT почти гарантированно ведет к гибели. Персонаж должен полагаться только на скрытность, хитрость и случай. Любая ошибка может стать последней.';
                default:
                    return 'ШАНС УСПЕХА (НОРМА): Действия персонажа имеют средний шанс успеха. Прямые атаки на SASAVOT обычно проваливаются. Используй окружение, предметы и избегай открытого конфликта. Монстр силен, но не всеведущ.';
            }
        }

        function getSystemWarningText(awakeTurn) {
            return `<span style='color: #ff0000; font-size: clamp(0.9rem, 2vw, 1.8rem); display: block; line-height: 1.2;'>⚠️ ВНИМАНИЕ: НА ${awakeTurn} ХОДЕ МАНЬЯК SASAVOT ПРОСНЕТСЯ И НАЧНЕТ АКТИВНЫЙ ПОИСК ЧЕЛОВЕКА В КОМПЛЕКСЕ.</span><hr style='border: 1px dashed #ff0000; margin: clamp(6px, 1vw, 12px) 0 clamp(10px, 1.5vw, 18px) 0;'>`;
        }

        function buildSystemPrompt(turn, difficulty, awakeTurn) {
            const rebalanceRule = getRebalanceRule(difficulty);
            return `Ты — ведущий интерактивной текстовой хоррор-игры "sasavot". Персонаж заперт в заброшенном комплексе ЮАО, где скрывается пиксельный монстр SASAVOT.

ПРАВИЛА ОФОРМЛЕНИЯ И ИГРЫ:

НИКАКОГО ОБРАЩЕНИЯ К ИГРОКУ: Строго запрещено использовать слова "ты", "вы", "твой", "ваш" и глаголы во втором лице. Пиши исключительно в третьем лице (например: "персонаж осматривается", "взгляд падает на...", "в углу лежит...").

ПОЛНЫЙ ЗАПРЕТ НА MARKDOWN И РАЗМЕТКУ: Строго запрещено использовать любые символы форматирования текста. НЕ используй двойные или одинарные звёздочки (** или *), решётки (#), дефисы перед строками (- ) для списков. Пиши весь текст чистым языком, как в обычной книге. Если нужно выделить объект или сделать перечисление предметов, просто пиши их названия с большой буквы или выделяй кавычками, но БЕЗ звёздочек.

ЧЕТКОСТЬ И КОНКРЕТИКА: Описывай локацию просто, понятно и по делу. Указывай, какие комнаты/развилки видны и какие конкретно предметы лежат в доступности (на столах, полках или полу).

СВОБОДА ДЕЙСТВИЙ И БАЛАНС: Игрок пишет любые действия. Персонаж не должен погибнуть до ${awakeTurn}-${awakeTurn + 5} хода. При опасных шагах наноси ранения, пугай звуками, но давай способ исправиться.

ХОДЫ И ПОВЕДЕНИЕ МОНСТРА: Сейчас идет ход игры № ${turn}. До ${awakeTurn} хода маньяк SASAVOT спит. Ровно на ${awakeTurn} ходе и далее маньяк просыпается, выходит на охоту и начинает активно преследовать персонажа по пятам. Отражай это в атмосфере.

СЛОЖНОСТЬ (${difficulty}): Изменяет агрессию окружения и шанс найти полезное.

${rebalanceRule}

ФИНАЛ: Всего заложено около 22 вариантов концовок. Завершай строку текстом "[КОНЦОВКА: Название]" при успешном или фатальном финале.

СТРОГОЕ ОБНОВЛЕНИЕ ИНВЕНТАРЯ: В самом конце своего ответа (строго с новой строки) ты ОБЯЗАН вывести специальный технический тег в формате: [INVENTORY: предмет1, предмет2...] перечислив через запятую все вещи, которые сейчас находятся у персонажа. Если инвентарь пуст, пиши [INVENTORY: пуст].

ЗАПРЕТ НА ИНОСТРАННЫЕ ЯЗЫКИ: Отвечай строго на русском языке. Категорически запрещено использовать китайский, английский или любые другие языки. Весь текст должен быть только на русском, без единого иероглифа.

СПИСОК ВСЕХ КОНЦОВОК (22 шт.):

1. Побег по Вентиляции — найти разводной ключ в шкафчиках, залезть в вентиляцию, заблокировать лопасти.

2. Новый Монстр — в химической лаборатории выпить "СЫВОРОТКУ-X" и атаковать монстра.

3. Побег через сток — спуститься в канализацию через люк, пройти дренажный коллектор.

4. Утонувший во тьме — спуститься в канализацию и провалить прохождение коллектора.

5. Побег из Секретной Комнаты — найти кассету, вставить в плеер на складе, открыть замок кодом 5555, взять сигнальный пистолет.

6. Побег через Взлом — на складе взломать гермодверь с надписью "ВЫХОД".

7. Аварийное Спасение — найти код 4869, ввести на пульте генератора, бежать к главному выходу.

8. Эвакуация — в генераторной найти рацию в шкафу, подать сигнал бедствия.

9. Побег Светом Софитов — разводным ключом затянуть клапан давления в генераторной, вызвать перегрузку.

10. Героическое Самопожертвование — сделать перегрузку генератора, затем сломать систему охлаждения.

11. Побег при Освещении — запустить генератор вручную, бежать к главному выходу.

12. Огненный Капкан — провалить ручной запуск генератора (взрыв).

13. Побег на Лифте — найти код 1337, ввести на панели лифта.

14. Ручной Побег через Лифт — в лифтовой шахте спуститься по тросу на крышу кабины.

15. Свободное Падение — провалить спуск по тросу в лифтовой шахте.

16. Прямой Побег из Архива — проникнуть в архив (код 9999), бежать к выходу на крышу.

17. Истина Раскрыта — найти USB-флешку, проникнуть в архив, загрузить данные в сеть.

18. Побег через Коридор — рывок к техническому выходу во время шума вентиляции.

19. Побег по Лестнице — найти кассету, отвлечь монстра на складе, подняться на крышу.

20. Химический Правосудие — в лаборатории создать дымовую завесу, бросить реактив в монстра.

21. Застыл от Страха — позволить таймеру истечь на любой сцене.

22. Побег со Склада — вставить кассету в плеер и пройти к пожарному выходу.`;
        }

        const AmbientController = {
            audio1: null,
            audio2: null,
            audio3: null,
            phase: 'idle',
            fadeTimer: null,

            init() {
                this.audio1 = new Audio('ambient1.mp3');
                this.audio1.loop = true;
                this.audio1.volume = 0;
                this.audio1.preload = 'auto';

                this.audio2 = new Audio('ambient2.mp3');
                this.audio2.loop = false;
                this.audio2.volume = 0;
                this.audio2.preload = 'auto';

                this.audio3 = new Audio('ambient3.mp3');
                this.audio3.loop = true;
                this.audio3.volume = 0;
                this.audio3.preload = 'auto';
            },

            startAmbient1() {
                if (this.phase !== 'idle') return;
                this.phase = 'ambient1';
                this.audio1.currentTime = 0;
                this.audio1.play().catch(() => {});
                this.fade(this.audio1, 0.3, 1500);
            },

            transitionToAmbient3() {
                if (this.phase !== 'ambient1') return;
                this.phase = 'transitioning';

                this.audio2.currentTime = 0;
                this.audio2.volume = 0;
                this.audio2.play().catch(() => {});

                this.crossfade(this.audio1, this.audio2, 1500, () => {
                    this.audio1.pause();
                    this.audio2.onended = () => {
                        this.phase = 'ambient3';
                        this.audio3.currentTime = 0;
                        this.audio3.volume = 0;
                        this.audio3.play().catch(() => {});
                        this.fade(this.audio3, 0.3, 1500);
                    };
                });
            },

            fade(el, targetVol, duration) {
                if (this.fadeTimer) clearInterval(this.fadeTimer);
                const start = el.volume;
                const step = targetVol - start;
                const steps = duration / 30;
                const volStep = step / steps;
                let count = 0;

                this.fadeTimer = setInterval(() => {
                    count++;
                    el.volume = Math.max(0, Math.min(0.5, start + volStep * count));
                    if (count >= steps) {
                        el.volume = targetVol;
                        clearInterval(this.fadeTimer);
                        this.fadeTimer = null;
                    }
                }, 30);
            },

            crossfade(fadeOut, fadeIn, duration, onDone) {
                if (this.fadeTimer) clearInterval(this.fadeTimer);
                const startVol = fadeOut.volume;
                const steps = duration / 30;
                const volStep = startVol / steps;
                const inStep = 0.3 / steps;
                let count = 0;

                this.fadeTimer = setInterval(() => {
                    count++;
                    fadeOut.volume = Math.max(0, startVol - volStep * count);
                    fadeIn.volume = Math.min(0.3, inStep * count);
                    if (count >= steps) {
                        fadeOut.volume = 0;
                        fadeIn.volume = 0.3;
                        clearInterval(this.fadeTimer);
                        this.fadeTimer = null;
                        if (onDone) onDone();
                    }
                }, 30);
            },

            stopAll() {
                if (this.fadeTimer) clearInterval(this.fadeTimer);
                [this.audio1, this.audio2, this.audio3].forEach(a => {
                    if (a) { a.pause(); a.volume = 0; a.currentTime = 0; }
                });
                this.phase = 'idle';
            }
        };

        function startGame() {
            gameState.difficulty = document.getElementById('difficulty-select').value;
            gameState.awakeTurn = getAwakeTurn(gameState.difficulty);
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('gameplay').style.display = 'flex';
            document.getElementById('hud-diff').innerText = "СЛОЖНОСТЬ: " + getDifficultyLabel(gameState.difficulty);
            
            AmbientController.init();
            AmbientController.startAmbient1();
            
            initAIStory();
        }

        function processInventoryAndText(aiResponse) {
            const regex = /\[INVENTORY:\s*([^\]]+)\]/i;
            const match = aiResponse.match(regex);
            let cleanText = aiResponse;

            if (match) {
                const itemsList = match[1].trim().toUpperCase();
                document.getElementById('hud-inventory').innerText = "ИНВЕНТАРЬ: " + itemsList;
                cleanText = aiResponse.replace(regex, '').trim();
            }
            return cleanText;
        }

        const API_KEY = "sk-smart-rj1D4tJaI51qfBo4zJr7YmJLrCtAOCF8oHPTv395XA4";
        const API_URL = "https://api.smartapi.shop/v1/chat/completions";
        const CORS_PROXY = "https://corsproxy.io/?";

        async function callAI(messages, turn, difficulty, awakeTurn, retries = 3) {
            for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                    const apiMessages = [
                        { role: "system", content: buildSystemPrompt(turn, difficulty, awakeTurn) }
                    ];

                    messages.forEach(msg => {
                        apiMessages.push({ role: msg.role, content: msg.text });
                    });

                    const response = await fetch(CORS_PROXY + encodeURIComponent(API_URL), {
                        method: "POST",
                        headers: {
                            "Authorization": "Bearer " + API_KEY,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: "mimo-v2.5",
                            messages: apiMessages,
                            max_tokens: 1500,
                            temperature: 0.7
                        })
                    });

                    if (response.status === 402) {
                        throw new Error("Недостаточно баланса. Пополните счет.");
                    }
                    if (response.status === 429 && attempt < retries) {
                        await new Promise(r => setTimeout(r, 2000 * attempt));
                        continue;
                    }
                    if (!response.ok && attempt < retries) {
                        await new Promise(r => setTimeout(r, 1000 * attempt));
                        continue;
                    }

                    const data = await response.json();
                    let text = data.choices[0].message.content.trim();
                    text = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g, '');
                    return text;
                } catch (e) {
                    if (attempt < retries && e.message !== "Недостаточно баланса. Пополните счет.") {
                        await new Promise(r => setTimeout(r, 1000 * attempt));
                        continue;
                    }
                    throw e;
                }
            }
        }

        async function initAIStory() {
            const log = document.getElementById('text-log');
            log.innerHTML = getSystemWarningText(gameState.awakeTurn) + "<em>ИИ генерирует начальное пространство комплекса...</em>";
            setControls(false);

            const startQuery = "Начни игру. Опиши стартовую комнату, четко укажи, какие предметы лежат на виду (на столах/полу) и какие двери ведут наружу. Пиши строго в третьем лице. Не забудь добавить в конце тег инвентаря.";
            gameState.history.push({ role: "user", text: startQuery });

            try {
                const aiResponse = await callAI(gameState.history, gameState.turn, gameState.difficulty, gameState.awakeTurn);
                gameState.history.push({ role: "assistant", text: aiResponse });
                
                const processedText = processInventoryAndText(aiResponse);
                log.innerHTML = getSystemWarningText(gameState.awakeTurn) + "<p>" + processedText.replace(/\n/g, '<br>') + "</p>";
            } catch (e) {
                handleAIError(e, log, true);
            }
            setControls(true);
        }

        async function sendAction() {
            const input = document.getElementById('player-action');
            const log = document.getElementById('text-log');
            const actionText = input.value.trim();
            
            if(!actionText) return;
            
            input.value = "";
            setControls(false);
            
            gameState.turn++;
            document.getElementById('hud-turn').innerText = "ХОД: " + gameState.turn;
            
            if (gameState.turn >= gameState.awakeTurn) {
                document.getElementById('hud-turn').style.color = "#ff0000";
                document.getElementById('hud-turn').style.fontWeight = "bold";
                document.getElementById('hud-turn').innerText = "ХОД: " + gameState.turn + " (SASAVOT ПРОСНУЛСЯ!)";
            }
            
            if (gameState.turn === gameState.awakeTurn) {
                AmbientController.transitionToAmbient3();
            }
            
            const warnings = log.getElementsByClassName('ai-warning-box');
            while(warnings.length > 0) {
                warnings[0].parentNode.removeChild(warnings[0]);
            }

            const currentContent = log.innerHTML.split('<em>Поток данных ИИ...</em>')[0];
            log.innerHTML = currentContent + "<br><br><span style='color: #ffaa00;'>> Действие персонажа: " + actionText + "</span><br><br><em>Поток данных ИИ...</em>";
            log.scrollTop = log.scrollHeight;

            const userTextConverted = `Персонаж делает следующее: "${actionText}". Опиши результат в третьем лице. Четко укажи новые доступные предметы на столах и пути. Обязательно обнови в конце тег [INVENTORY: ...]`;
            gameState.history.push({ role: "user", text: userTextConverted });

            try {
                const aiResponse = await callAI(gameState.history, gameState.turn, gameState.difficulty, gameState.awakeTurn);
                gameState.history.push({ role: "assistant", text: aiResponse });
                
                const cleanLogs = log.innerHTML.split('<em>Поток данных ИИ...</em>')[0];
                const processedText = processInventoryAndText(aiResponse);
                
                log.innerHTML = cleanLogs + processedText.replace(/\n/g, '<br>');
                log.scrollTop = log.scrollHeight;

                if (aiResponse.includes("[КОНЦОВКА:")) {
                    log.innerHTML += "<br><br><span style='color: #00ff66; font-size: clamp(1.3rem, 3.2vw, 2.8rem);'>ХРОНИКА ЗАВЕРШЕНА</span>";
                    setControls(false);
                    return;
                }
                setControls(true);

            } catch (e) {
                handleAIError(e, log, false, actionText);
            }
        }

        function handleAIError(error, logElement, isInit = false, lastAction = "") {
            const cleanLogs = logElement.innerHTML.split('<em>Поток данных ИИ...</em>')[0];
            let userMessage = "⚡ КАНАЛ СВЯЗИ ПЕРЕГРУЖЕН: Облачный ИИ обрабатывает внешние запросы. Подождите 5-10 секунд и отправьте команду снова, сессия сохранена.";
            
            logElement.innerHTML = cleanLogs + `<div class="ai-warning-box">${userMessage}</div>`;
            logElement.scrollTop = logElement.scrollHeight;

            if (!isInit && lastAction) {
                document.getElementById('player-action').value = lastAction;
            }
            setControls(true);
        }

        function setControls(enabled) {
            document.getElementById('player-action').disabled = !enabled;
            document.getElementById('send-btn').disabled = !enabled;
            if(enabled) document.getElementById('player-action').focus();
        }
    </script>
</body>
</html>
